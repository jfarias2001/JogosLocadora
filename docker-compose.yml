services:
  pixelrent:
    build: .
    container_name: pixelrent
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pixelrent.rule=Host(`pixel.paglamp.com.br`)"
      - "traefik.http.routers.pixelrent.entrypoints=websecure"
      - "traefik.http.routers.pixelrent.tls=true"
      - "traefik.http.services.pixelrent.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
