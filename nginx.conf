server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Suporte a SPA (React Router / rotas do front)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache para assets estáticos gerados pelo Vite
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
